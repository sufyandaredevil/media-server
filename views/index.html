<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEx</title>
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231e1e1e'/%3E%3Cpath d='M40 30 L70 50 L40 70 Z' fill='%23007acc' stroke='%23007acc' stroke-width='4' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="explorer">
            <div class="explorer-header">
                <span>Explorer: {{ROOT_NAME}}</span>
                <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle Sidebar">‹</button>
            </div>
            <div class="search-container">
                <input type="text" id="explorer-search" placeholder="Search files..." autocomplete="off">
            </div>
            <div id="breadcrumbs" class="breadcrumbs"></div>
            <div id="back-button-container" style="display: none;"></div>
            <div id="root-tree" class="tree-view">
                <div class="loading-indicator">Loading explorer...</div>
            </div>
        </aside>
        <div id="resizer" class="resizer"></div>
        <main class="main-content">
            <button id="sidebar-show" class="sidebar-toggle" title="Show Sidebar" style="display: none;">›</button>
            <div id="player-section" class="player-section">
                <div class="empty-state">
                    <p style="color: #555; font-style: italic; text-align: center;">Select a media file from the explorer to play</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/app.js"></script>
</body>
</html>
